# lsd configuration
# https://github.com/lsd-rs/lsd#config-file-content

# Icons
icons:
  when: never
  theme: fancy
  separator: " "

# Colors
color:
  when: auto
  theme: default

# Date format
date: relative

# Layout
layout: grid

# Sorting
sorting:
  column: name
  reverse: false
  dir-grouping: first

# Permission style
permission: attributes

# Size display
size: default

# Symlinks
symlink-arrow: "⇒"

# Columns shown in long format — excludes user/group which are very slow
# on Windows due to security API calls per file
blocks:
  - permission
  - size
  - date
  - name

# Header row in long format
header: false

# Hyperlinks
hyperlink: never
