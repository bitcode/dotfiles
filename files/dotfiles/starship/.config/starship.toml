# ~/.config/starship.toml
# Foraya color theme (contrast=hard, accent=muted)
# See theming/foraya/palette.yml — regenerate via theming/foraya/generate.py

# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = false

# Username module configuration
[username]
style_user = "bold #DBBC7F"
disabled = false

# Hostname module configuration
[hostname]
ssh_only = true
style = "bold dimmed #7FBBB3"
disabled = false

# Directory module configuration
[directory]
truncation_length = 3
truncate_to_repo = false
style = "bold #83C092"
disabled = false

# Git branch module configuration
[git_branch]
symbol = " "
style = "bold #D699B6"
disabled = false

# Git status module configuration
[git_status]
style = "bold #E67E80"
disabled = false

# Package module configuration
[package]
disabled = true

# NodeJS module configuration
[nodejs]
symbol = "⬢ "
style = "bold #A7C080"
disabled = false

# Python module configuration
[python]
symbol = "🐍 "
style = "bold #7FBBB3"
disabled = false

# Jobs module configuration
[jobs]
threshold = 1
symbol = "⚙️ "
style = "bold #E67E80"
disabled = false

# Character module configuration
[character]
success_symbol = "[➜](bold #A7C080)"
error_symbol = "[✗](bold #E67E80)"
vicmd_symbol = "[❮](bold #D699B6)"
disabled = false
