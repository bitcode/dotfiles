; Foraya color theme (contrast=hard, accent=muted)
; See theming/foraya/palette.yml — regenerate via theming/foraya/generate.py
; Included from config.ini via `include-file = colors-foraya.ini`

[colors]
background = #272E33
background-alt = #374145
foreground = #D3C6AA
foreground-alt = #859289
primary = #E6B450
pink = #D699B6
blue = #7FBBB3
yellow = #DBBC7F
green = #A7C080
aqua = #83C092
orange = #E69875
inactive = #859289
secondary = #83C092
alert = #E67E80
disabled = #7A8478

; Gradient colors setup (powerline-style separators)
[gradient]
color-1 = #9DA9A0
color-2 = #859289
color-3 = #414B4F
