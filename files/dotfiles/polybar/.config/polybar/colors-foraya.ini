; Foraya color theme (contrast=medium, accent=vivid)
; See theming/foraya/palette.yml — regenerate via theming/foraya/generate.py
; Included from config.ini via `include-file = colors-foraya.ini`

[colors]
background = #0D1017
background-alt = #141821
foreground = #EBDBB2
foreground-alt = #928374
primary = #E6B450
pink = #D3869B
blue = #83A598
yellow = #FABD2F
inactive = #928374
secondary = #8EC07C
alert = #FB4934
disabled = #7C6F64

; Gradient colors setup (powerline-style separators)
[gradient]
color-1 = #A89984
color-2 = #928374
color-3 = #1B1F29
