# Foraya color theme (contrast=medium, accent=vivid)
# See theming/foraya/palette.yml — regenerate via theming/foraya/generate.py
set -g status-style "bg=#0D1017,fg=#EBDBB2"
set -g pane-border-style "fg=#1B1F29"
set -g pane-active-border-style "fg=#B8BB26"

# Status line customization
set -g status-left-length 40
set -g status-justify centre

# Change status bar color in prefix mode with PREFIX indicator
set-option -g status-left '#{?client_prefix,#[bg=#B8BB26#,fg=#0D1017],#[bg=#0D1017#,fg=#B8BB26]} #S #{?client_prefix,#[bg=#B8BB26#,fg=#0D1017],#[bg=#0D1017#,fg=#7C6F64]} │'
set-option -g status-right '#{?client_prefix,#[reverse]  PREFIX #[noreverse] ,}#{?client_prefix,#[bg=#B8BB26#,fg=#0D1017],#[bg=#0D1017#,fg=#7C6F64]}│ #{?client_prefix,#[bg=#B8BB26#,fg=#0D1017],#[bg=#0D1017#,fg=#EBDBB2]}%Y-%m-%d %H:%M '

# Window status
set-window-option -g window-status-current-format '#{?client_prefix,#[bg=#B8BB26#,fg=#0D1017],#[bg=#0D1017#,fg=#B8BB26]} #I:#W '
set-window-option -g window-status-format '#{?client_prefix,#[bg=#B8BB26#,fg=#0D1017],#[bg=#0D1017#,fg=#7C6F64]} #I:#W '

# Pane number display
set-option -g display-panes-active-colour '#FB4934'
set-option -g display-panes-colour '#141821'

# Bell
set-window-option -g window-status-bell-style 'bg=#FB4934,fg=#141821'
