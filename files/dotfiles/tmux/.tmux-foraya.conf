# Foraya color theme (contrast=hard, accent=muted)
# See theming/foraya/palette.yml — regenerate via theming/foraya/generate.py
# Status bar uses palette.background.panel (#374145) rather than .base
# (#272E33): .base is identical to Alacritty's own background, so the bar
# would be invisible against the terminal. .panel is one step up Everforest's
# own bg ladder — same family, distinct enough to read as a bar.
set -g status-style "bg=#374145,fg=#D3C6AA"
set -g pane-border-style "fg=#414B4F"
set -g pane-active-border-style "fg=#A7C080"

# Status line customization
set -g status-left-length 40
set -g status-justify centre

# Change status bar color in prefix mode with PREFIX indicator
set-option -g status-left '#{?client_prefix,#[bg=#A7C080#,fg=#272E33],#[bg=#374145#,fg=#A7C080]} #S #{?client_prefix,#[bg=#A7C080#,fg=#272E33],#[bg=#374145#,fg=#7A8478]} │'
set-option -g status-right '#{?client_prefix,#[reverse]  PREFIX #[noreverse] ,}#{?client_prefix,#[bg=#A7C080#,fg=#272E33],#[bg=#374145#,fg=#7A8478]}│ #{?client_prefix,#[bg=#A7C080#,fg=#272E33],#[bg=#374145#,fg=#D3C6AA]}%Y-%m-%d %H:%M '

# Window status
set-window-option -g window-status-current-format '#{?client_prefix,#[bg=#A7C080#,fg=#272E33],#[bg=#374145#,fg=#A7C080]} #I:#W '
set-window-option -g window-status-format '#{?client_prefix,#[bg=#A7C080#,fg=#272E33],#[bg=#374145#,fg=#7A8478]} #I:#W '

# Pane number display
set-option -g display-panes-active-colour '#E67E80'
set-option -g display-panes-colour '#374145'

# Bell
set-window-option -g window-status-bell-style 'bg=#E67E80,fg=#374145'
