# Mouse support and copy mode settings
set-option -g -q mouse on

# Use vi mode keys in copy mode
setw -g mode-keys vi

# Pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'smilovanovic/tmux-claude'
set -g @plugin 'egel/tmux-gruvbox'
set -g @tmux-gruvbox 'dark256'
set -g @tmux-gruvbox-right-status-x '#{claude_status} | %d.%m.%Y'

# tmux-yank configuration for macOS
set -g @yank_selection_mouse 'clipboard'
set -g @yank_action 'copy-pipe-and-cancel'

# Better mouse selection bindings for copy mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Source .tmux.conf with prefix r
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Don't exit tmux when killing session
bind-key x kill-pane # skip "kill-pane 1? (y/n)" prompt
set -g detach-on-destroy off  # don't exit from tmux when closing a session

# Set the history limit so we get lots of scrollback.
setw -g history-limit 500000

# Load only on default shell (alacritty)
set -g default-command "${SHELL}"

bind-key S run-shell "~/dotfiles/scripts/tmux_session_switcher.sh"

# Foraya color theme (Ayu + Gruvbox + Everforest blend)
source-file ~/.tmux-foraya.conf

set-option -sg escape-time 10
set-option -g focus-events on
set-option -sa terminal-features ',xxx:RGB'

# Extended keys: pass kitty keyboard protocol sequences through to inner apps
# Required for Shift+Enter to work in Claude Code, Neovim, etc.
# Note: 'always' (not 'on') prevents newlines in pastes from being translated
# to extended key sequences like [27;5;106~
set-option -g extended-keys always
set-option -as terminal-features 'xterm*:extkeys'

# Initialize TMUX plugin manager
run '~/.tmux/plugins/tpm/tpm'
